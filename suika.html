<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수박게임 🍉</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: radial-gradient(ellipse at 50% 40%, #d9994e 0%, #b8712a 60%, #a05e20 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    overflow: hidden;
    user-select: none;
}

/* ── 루트 레이아웃 ── */
#root {
    display: flex;
    align-items: flex-start;
    gap: 10px;
}

/* ── 좌/우 패널 ── */
.side {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
    width: 158px;
}

/* ── 버블 ── */
.bubble {
    position: relative;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 38% 32%,
        rgba(255,255,255,0.60) 0%,
        rgba(255,240,190,0.30) 45%,
        rgba(210,165,90,0.18) 100%);
    border: 2.5px solid rgba(255,255,255,0.55);
    box-shadow: 0 6px 24px rgba(0,0,0,0.28),
                inset 0 2px 10px rgba(255,255,255,0.45),
                inset 0 -4px 12px rgba(180,120,40,0.2);
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.45);
}

/* 버블 하이라이트 */
.bubble::before {
    content:'';
    position:absolute;
    top:12%; left:18%;
    width:38%; height:20%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.55) 0%, transparent 100%);
    border-radius: 50%;
    transform: rotate(-20deg);
    pointer-events: none;
}

#score-bubble { width:152px; height:152px; }
#score-bubble .blabel { font-size:18px; font-weight:900; letter-spacing:-0.3px; margin-bottom:1px; }
#score-val { font-size:40px; font-weight:900; line-height:1; }
#score-bubble .best-label { font-size:9.5px; color:rgba(255,255,255,0.72); margin-top:5px; letter-spacing:0.5px; }
#best-val { font-size:20px; font-weight:900; color:#ffe566; text-shadow:0 0 10px rgba(255,220,0,0.7); }

#next-bubble { width:152px; height:152px; }
#next-bubble .blabel { font-size:16px; font-weight:700; margin-bottom:4px; }
#next-canvas { display:block; background:transparent; }

/* ── 순위 패널 ── */
#rank-panel {
    width: 158px;
    background: linear-gradient(160deg, #fde9aa 0%, #f9d570 100%);
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 18px;
    padding: 10px 8px 12px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.22), inset 0 1px 6px rgba(255,255,255,0.5);
}
#rank-panel .ptitle {
    text-align: center;
    font-size: 13px;
    font-weight: 900;
    color: #7a4800;
    margin-bottom: 7px;
    letter-spacing: -0.3px;
}
.rank-tabs {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 7px;
    padding: 0 2px;
}
.rtab {
    font-size: 11px;
    font-weight: 700;
    color: rgba(120,75,0,0.55);
    padding: 1px 5px;
    border-radius: 4px;
    cursor: pointer;
}
.rtab.active {
    color: #7a4800;
    background: rgba(255,255,255,0.45);
}
.rank-person { text-align:center; font-size:18px; margin-bottom:4px; }

/* 배지 행 */
.rank-row {
    display: flex;
    align-items: center;
    border-radius: 8px;
    padding: 3px 4px;
    margin-bottom: 3px;
    gap: 4px;
}
.rank-row.r1 { background: rgba(255,215,50,0.35); }
.rank-row.r2 { background: rgba(180,215,255,0.4); }
.rank-row.r3 { background: rgba(240,170,90,0.35); }
.rank-row.rnow { background: rgba(255,215,50,0.45); margin-top: 6px; }

.badge {
    width: 34px; height: 34px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 900;
    color: #fff;
    flex-shrink: 0;
    position: relative;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.badge::after {
    content: '';
    position: absolute;
    top: 2px; left: 25%;
    width: 50%; height: 35%;
    background: rgba(255,255,255,0.35);
    border-radius: 50%;
}
.b1 { background: linear-gradient(160deg, #f9e44a 0%, #e6a800 100%); border:1.5px solid #ffd700; }
.b2 { background: linear-gradient(160deg, #c8dfff 0%, #7ab0f0 100%); border:1.5px solid #a0c8ff; }
.b3 { background: linear-gradient(160deg, #f0c878 0%, #c87820 100%); border:1.5px solid #e8a030; }
.bnow { background: linear-gradient(160deg, #f9e44a 0%, #e6a800 100%); border:1.5px solid #ffd700; width:28px; height:28px; font-size:12px; }

.rank-score {
    flex: 1;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    color: #6a3800;
    letter-spacing: 1px;
}
.rank-now-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.now-label { font-size: 9px; font-weight:700; color:#8a5000; }
.now-score { font-size: 17px; font-weight:900; color:#5a3000; }

/* ── 게임 캔버스 ── */
#canvas-wrap { position: relative; }
#game-canvas {
    display: block;
    cursor: none;
    border-radius: 3px;
    box-shadow: 0 6px 30px rgba(0,0,0,0.4);
}

/* ── 진화의 고리 패널 ── */
#evo-panel {
    width: 158px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
}
#evo-panel .ptitle {
    font-size: 15px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 2px 6px rgba(0,0,0,0.45);
    letter-spacing: -0.3px;
}
#evo-canvas { display: block; }

/* ── 오버레이 ── */
#overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    z-index: 20;
    border-radius: 3px;
    backdrop-filter: blur(3px);
}
#overlay.hidden { display:none; }
#overlay h1 { font-size:36px; font-weight:900; margin-bottom:4px; }
#overlay .sub { font-size:13px; opacity:.6; margin-bottom:4px; }
#overlay .fscore { font-size:56px; font-weight:900; color:#ffe066; text-shadow:0 0 18px rgba(255,220,0,0.65); }
#overlay .best-note { font-size:13px; color:#ffd700; margin-top:4px; }
#restart-btn {
    margin-top:22px;
    padding:13px 44px;
    font-size:16px;
    font-weight:900;
    background: linear-gradient(135deg, #e67e22, #f39c12);
    color:white; border:none; border-radius:40px; cursor:pointer;
    box-shadow: 0 4px 20px rgba(230,120,0,0.55);
    transition: transform .15s;
}
#restart-btn:hover { transform:scale(1.06); }
</style>
</head>
<body>
<div id="root">

    <!-- 왼쪽 패널 -->
    <div class="side">
        <div class="bubble" id="score-bubble">
            <div class="blabel">점수</div>
            <div id="score-val">0</div>
            <div class="best-label">BEST SCORE</div>
            <div id="best-val">0</div>
        </div>

        <div id="rank-panel">
            <div class="ptitle">오늘의 득점 순위</div>
            <div class="rank-tabs">
                <span class="rtab active">L</span>
                <span class="rtab">R</span>
            </div>
            <div class="rank-person">👤</div>
            <div class="rank-row r1">
                <div class="badge b1">1</div>
                <div class="rank-score" id="rank1">─────</div>
            </div>
            <div class="rank-row r2">
                <div class="badge b2">2</div>
                <div class="rank-score" id="rank2">─────</div>
            </div>
            <div class="rank-row r3">
                <div class="badge b3">3</div>
                <div class="rank-score" id="rank3">─────</div>
            </div>
            <div class="rank-row rnow">
                <div class="badge bnow">1</div>
                <div class="rank-now-wrap">
                    <div class="now-label">NOW</div>
                    <div class="now-score" id="rank-now">0</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 게임 캔버스 -->
    <div id="canvas-wrap">
        <canvas id="game-canvas"></canvas>
        <div id="overlay" class="hidden">
            <h1>게임 오버 😢</h1>
            <div class="sub">최종 점수</div>
            <div class="fscore" id="final-score">0</div>
            <div class="best-note" id="new-best" style="display:none">🏆 신기록!</div>
            <button id="restart-btn" onclick="restartGame()">다시 시작 🔄</button>
        </div>
    </div>

    <!-- 오른쪽 패널 -->
    <div class="side">
        <div class="bubble" id="next-bubble">
            <div class="blabel">다음</div>
            <canvas id="next-canvas" width="88" height="88"></canvas>
        </div>

        <div id="evo-panel">
            <div class="ptitle">진화의 고리</div>
            <canvas id="evo-canvas" width="158" height="168"></canvas>
        </div>
    </div>
</div>

<script>
/* ══════════════════════════════════════════════
   과일 데이터
══════════════════════════════════════════════ */
const FRUITS = [
    { name:'체리',     r:15,  color:'#cc2222', grad:'#ff6666', emoji:'🍒', score:1   },
    { name:'딸기',     r:22,  color:'#e8184a', grad:'#ff6b9d', emoji:'🍓', score:3   },
    { name:'포도',     r:30,  color:'#7c3aed', grad:'#c4b5fd', emoji:'🍇', score:6   },
    { name:'금귤',     r:38,  color:'#d97706', grad:'#fde68a', emoji:'🍊', score:10  },
    { name:'감',       r:47,  color:'#dc6d15', grad:'#fed7aa', emoji:'🫐', score:15  },
    { name:'사과',     r:55,  color:'#dc2626', grad:'#fca5a5', emoji:'🍎', score:21  },
    { name:'배',       r:63,  color:'#65a30d', grad:'#d9f99d', emoji:'🍐', score:28  },
    { name:'복숭아',   r:71,  color:'#e879a0', grad:'#fecdd3', emoji:'🍑', score:36  },
    { name:'파인애플', r:80,  color:'#ca8a04', grad:'#fef08a', emoji:'🍍', score:45  },
    { name:'멜론',     r:90,  color:'#16a34a', grad:'#bbf7d0', emoji:'🍈', score:55  },
    { name:'수박',     r:107, color:'#15803d', grad:'#86efac', emoji:'🍉', score:100 },
];

/* ══════════════════════════════════════════════
   상수 / 캔버스
══════════════════════════════════════════════ */
const CW=360, CH=580;
const WALL_T=18, DANGER_Y=82, DROP_POOL=5;

const canvas = document.getElementById('game-canvas');
canvas.width=CW; canvas.height=CH;
const ctx = canvas.getContext('2d');

const nxCanvas = document.getElementById('next-canvas');
const nxCtx    = nxCanvas.getContext('2d');

const evoCanvas = document.getElementById('evo-canvas');
const evoCtx    = evoCanvas.getContext('2d');

/* ══════════════════════════════════════════════
   Matter.js
══════════════════════════════════════════════ */
const { Engine, Bodies, World, Events, Composite } = Matter;
let engine, world;

/* ══════════════════════════════════════════════
   게임 상태
══════════════════════════════════════════════ */
let score=0, bestScore=+localStorage.getItem('suika_best')||0;
let gameOver=false, dropping=false;
let currentIdx=0, nextIdx=0, cursorX=CW/2;
let mergeQueue=[], particles=[], floatTexts=[];
let dangerTimer=0, goTimer=null;
let todayScores=JSON.parse(localStorage.getItem('suika_today')||'[]');

document.getElementById('best-val').textContent = bestScore;
updateRankPanel();

/* ══════════════════════════════════════════════
   이모지 캐시 (원형 클리핑 + 그라데이션 배경 + 하이라이트)
══════════════════════════════════════════════ */
const emojiCache={};
function getEmojiImg(idx, radius) {
    const key = idx + '_' + radius;
    if (emojiCache[key]) return emojiCache[key];
    const f  = FRUITS[idx];
    const r  = radius || f.r;
    const sz = r * 2.6;
    const oc = document.createElement('canvas');
    oc.width = oc.height = Math.ceil(sz);
    const ox = oc.getContext('2d');
    const cx = sz/2, cy = sz/2;

    ox.beginPath();
    ox.arc(cx, cy, r * 1.0, 0, Math.PI*2);
    ox.clip();

    // 그라데이션 배경
    const g = ox.createRadialGradient(cx - r*0.2, cy - r*0.25, r*0.05, cx, cy, r);
    g.addColorStop(0, f.grad);
    g.addColorStop(1, f.color);
    ox.fillStyle = g;
    ox.fillRect(0, 0, sz, sz);

    // 하이라이트
    const h = ox.createRadialGradient(cx - r*0.28, cy - r*0.32, 0, cx - r*0.1, cy - r*0.1, r*0.6);
    h.addColorStop(0, 'rgba(255,255,255,0.52)');
    h.addColorStop(1, 'rgba(255,255,255,0)');
    ox.fillStyle = h;
    ox.fillRect(0, 0, sz, sz);

    // 이모지
    ox.font = `${r * 1.35}px serif`;
    ox.textAlign='center'; ox.textBaseline='middle';
    ox.fillText(f.emoji, cx, cy + r*0.06);

    // 테두리
    ox.beginPath();
    ox.arc(cx, cy, r, 0, Math.PI*2);
    ox.strokeStyle = 'rgba(255,255,255,0.35)';
    ox.lineWidth = 1.5;
    ox.stroke();

    emojiCache[key] = oc;
    return oc;
}

/* ══════════════════════════════════════════════
   물리 초기화
══════════════════════════════════════════════ */
function initPhysics() {
    engine = Engine.create({ gravity:{ y:2.2 } });
    world  = engine.world;
    World.add(world, [
        Bodies.rectangle(CW/2, CH+WALL_T/2, CW*2, WALL_T, { isStatic:true, label:'wall', friction:0.6 }),
        Bodies.rectangle(-WALL_T/2, CH/2, WALL_T, CH*2,   { isStatic:true, label:'wall' }),
        Bodies.rectangle(CW+WALL_T/2, CH/2, WALL_T, CH*2, { isStatic:true, label:'wall' }),
    ]);
    Events.on(engine, 'collisionStart', onCollision);
}

function onCollision(event) {
    if (gameOver) return;
    for (const { bodyA, bodyB } of event.pairs) {
        if (bodyA.label!=='fruit'||bodyB.label!=='fruit') continue;
        if (bodyA.fruitIdx!==bodyB.fruitIdx) continue;
        if (bodyA.fruitIdx>=FRUITS.length-1) continue;
        const dup = mergeQueue.some(m =>
            m.a.id===bodyA.id||m.a.id===bodyB.id||m.b.id===bodyA.id||m.b.id===bodyB.id);
        if (!dup) mergeQueue.push({ a:bodyA, b:bodyB });
    }
}

function makeFruit(x, y, idx) {
    const f=FRUITS[idx];
    const b=Bodies.circle(x, y, f.r, {
        restitution:0.3, friction:0.5, frictionAir:0.01,
        density:0.002+idx*0.0003, label:'fruit',
    });
    b.fruitIdx=idx;
    return b;
}

/* ══════════════════════════════════════════════
   합체
══════════════════════════════════════════════ */
function processMerges() {
    if (!mergeQueue.length) return;
    const batch=mergeQueue.splice(0), done=new Set();
    for (const { a, b } of batch) {
        if (done.has(a.id)||done.has(b.id)) continue;
        if (!Composite.get(world,a.id,'body')||!Composite.get(world,b.id,'body')) continue;
        done.add(a.id); done.add(b.id);
        const mx=(a.position.x+b.position.x)/2, my=(a.position.y+b.position.y)/2;
        const ni=a.fruitIdx+1;
        World.remove(world,a); World.remove(world,b);
        World.add(world, makeFruit(mx,my,ni));
        const gain=FRUITS[ni].score;
        score+=gain;
        document.getElementById('score-val').textContent=score;
        document.getElementById('rank-now').textContent=score;
        spawnParticles(mx,my,FRUITS[ni].color,ni);
        floatTexts.push({x:mx,y:my-10,text:`+${gain}`,alpha:1,vy:-2});
    }
}

/* ══════════════════════════════════════════════
   파티클
══════════════════════════════════════════════ */
function spawnParticles(x,y,color,tier) {
    const n=10+tier*3;
    for(let i=0;i<n;i++){
        const a=(Math.PI*2/n)*i+Math.random()*0.6, sp=1.5+Math.random()*5;
        particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,r:2+Math.random()*4,color,life:1});
    }
}

/* ══════════════════════════════════════════════
   드롭
══════════════════════════════════════════════ */
function randIdx(){ return Math.floor(Math.random()*DROP_POOL); }
function dropFruit() {
    if(dropping||gameOver) return;
    dropping=true;
    const f=FRUITS[currentIdx];
    const cx=Math.max(f.r+5,Math.min(CW-f.r-5,cursorX));
    World.add(world,makeFruit(cx,DANGER_Y-f.r-4,currentIdx));
    currentIdx=nextIdx; nextIdx=randIdx();
    setTimeout(()=>{ dropping=false; },450);
}

/* ══════════════════════════════════════════════
   게임 오버
══════════════════════════════════════════════ */
function checkDanger() {
    let danger=false;
    for(const b of Composite.allBodies(world)){
        if(b.label!=='fruit') continue;
        if(b.position.y-FRUITS[b.fruitIdx].r<DANGER_Y &&
           Math.abs(b.velocity.y)<1 && Math.abs(b.velocity.x)<1){ danger=true; break; }
    }
    if(danger){ dangerTimer+=16; if(dangerTimer>2200&&!goTimer) goTimer=setTimeout(triggerGameOver,200); }
    else { dangerTimer=0; clearTimeout(goTimer); goTimer=null; }
}

function triggerGameOver() {
    if(gameOver) return;
    gameOver=true;
    document.getElementById('final-score').textContent=score;
    if(score>bestScore){
        bestScore=score;
        localStorage.setItem('suika_best',bestScore);
        document.getElementById('best-val').textContent=bestScore;
        document.getElementById('new-best').style.display='block';
    } else { document.getElementById('new-best').style.display='none'; }
    todayScores.push(score);
    todayScores.sort((a,b)=>b-a);
    todayScores=todayScores.slice(0,3);
    localStorage.setItem('suika_today',JSON.stringify(todayScores));
    updateRankPanel();
    document.getElementById('overlay').classList.remove('hidden');
}

function updateRankPanel(){
    ['rank1','rank2','rank3'].forEach((id,i)=>{
        document.getElementById(id).textContent =
            todayScores[i]!==undefined ? todayScores[i].toLocaleString() : '─────';
    });
}

/* ══════════════════════════════════════════════
   게임 캔버스 렌더링
══════════════════════════════════════════════ */
function drawBG() {
    // 드롭존 (상단)
    ctx.fillStyle='#e0b870';
    ctx.fillRect(0,0,CW,DANGER_Y);

    // 게임존 크림
    const bg=ctx.createLinearGradient(0,DANGER_Y,0,CH);
    bg.addColorStop(0,'#fffdf0');
    bg.addColorStop(1,'#fdefc8');
    ctx.fillStyle=bg;
    ctx.fillRect(0,DANGER_Y,CW,CH-DANGER_Y);

    // 경계 그림자
    const sg=ctx.createLinearGradient(0,DANGER_Y,0,DANGER_Y+20);
    sg.addColorStop(0,'rgba(180,120,20,0.18)');
    sg.addColorStop(1,'rgba(180,120,20,0)');
    ctx.fillStyle=sg;
    ctx.fillRect(0,DANGER_Y,CW,20);
}

function drawBox() {
    const T=7;
    // 좌벽
    ctx.fillStyle=ctx.createLinearGradient(0,0,T*2,0);
    ctx.fillStyle='#c87830';
    ctx.fillRect(0,0,T,CH);
    ctx.fillStyle='rgba(255,200,100,0.35)';
    ctx.fillRect(0,0,2,CH);
    // 우벽
    ctx.fillStyle='#c87830';
    ctx.fillRect(CW-T,0,T,CH);
    ctx.fillStyle='rgba(255,200,100,0.35)';
    ctx.fillRect(CW-2,0,2,CH);
    // 바닥
    ctx.fillStyle='#b86820';
    ctx.fillRect(0,CH-T,CW,T);

    // 중앙 세로 가이드
    ctx.save();
    ctx.strokeStyle='rgba(180,130,50,0.3)';
    ctx.lineWidth=1;
    ctx.setLineDash([4,7]);
    ctx.beginPath(); ctx.moveTo(CW/2,0); ctx.lineTo(CW/2,CH); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // 위험선
    const flash=dangerTimer>0;
    ctx.save();
    ctx.strokeStyle=flash
        ?`rgba(255,50,50,${0.5+0.45*Math.sin(Date.now()*0.013)})`
        :'rgba(255,90,70,0.45)';
    ctx.lineWidth=flash?2.5:1.5;
    ctx.setLineDash([7,5]);
    ctx.beginPath(); ctx.moveTo(T,DANGER_Y); ctx.lineTo(CW-T,DANGER_Y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
}

function drawFruitAt(ctx2,x,y,idx,alpha=1,rot=0,overrideR) {
    const f=FRUITS[idx];
    const r=overrideR||f.r;
    ctx2.save();
    ctx2.translate(x,y);
    if(rot) ctx2.rotate(rot);
    ctx2.globalAlpha=alpha;
    const img=getEmojiImg(idx,r);
    const sz=r*2.6;
    ctx2.drawImage(img,-sz/2,-sz/2,sz,sz);
    ctx2.restore();
}

function drawAllFruits() {
    for(const b of Composite.allBodies(world)){
        if(b.label!=='fruit') continue;
        drawFruitAt(ctx,b.position.x,b.position.y,b.fruitIdx,1,b.angle);
    }
}

function drawDropPreview() {
    if(dropping||gameOver) return;
    const f=FRUITS[currentIdx];
    const cx=Math.max(f.r+7,Math.min(CW-f.r-7,cursorX));
    const cy=DANGER_Y/2;
    // 가이드선
    ctx.save();
    ctx.strokeStyle='rgba(160,110,40,0.4)';
    ctx.lineWidth=1;
    ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.moveTo(cx,cy+f.r+2); ctx.lineTo(cx,CH-7); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
    drawFruitAt(ctx,cx,cy,currentIdx,0.82);
}

function drawParticles() {
    for(let i=particles.length-1;i>=0;i--){
        const p=particles[i];
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.026;
        if(p.life<=0){particles.splice(i,1);continue;}
        ctx.save(); ctx.globalAlpha=p.life;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
        ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=6;
        ctx.fill(); ctx.restore();
    }
}

function drawFloatTexts() {
    for(let i=floatTexts.length-1;i>=0;i--){
        const ft=floatTexts[i];
        ft.y+=ft.vy; ft.alpha-=0.022;
        if(ft.alpha<=0){floatTexts.splice(i,1);continue;}
        ctx.save(); ctx.globalAlpha=ft.alpha;
        ctx.font='bold 18px sans-serif'; ctx.textAlign='center';
        ctx.strokeStyle='rgba(0,0,0,0.45)'; ctx.lineWidth=3; ctx.strokeText(ft.text,ft.x,ft.y);
        ctx.fillStyle='#ffee00'; ctx.fillText(ft.text,ft.x,ft.y);
        ctx.restore();
    }
}

/* ══════════════════════════════════════════════
   다음 과일 패널
══════════════════════════════════════════════ */
function drawNext() {
    nxCtx.clearRect(0,0,88,88);
    const f=FRUITS[nextIdx];
    const r=Math.min(f.r,34);
    drawFruitAt(nxCtx,44,44,nextIdx,1,0,r);
}

/* ══════════════════════════════════════════════
   진화의 고리 — 도넛 링 + 과일
══════════════════════════════════════════════ */
function drawEvoRing() {
    const W=158, H=168;
    evoCtx.clearRect(0,0,W,H);
    const cx=W/2, cy=H/2+4;
    const outerR=68, innerR=32;

    /* ── 링 그림자 ── */
    evoCtx.save();
    evoCtx.shadowColor='rgba(0,0,0,0.3)';
    evoCtx.shadowBlur=10;
    evoCtx.shadowOffsetY=4;

    /* ── 외부 원 (도넛 바깥) ── */
    // 링 자체를 그리기 위해 composite shape 사용
    evoCtx.beginPath();
    evoCtx.arc(cx, cy, outerR, 0, Math.PI*2, false);
    evoCtx.arc(cx, cy, innerR, 0, Math.PI*2, true);
    // 초록빛 그라데이션
    const ringGrad = evoCtx.createRadialGradient(cx-10, cy-10, innerR, cx, cy, outerR);
    ringGrad.addColorStop(0, '#a8e060');
    ringGrad.addColorStop(0.5, '#78c840');
    ringGrad.addColorStop(1, '#4ea828');
    evoCtx.fillStyle = ringGrad;
    evoCtx.fill('evenodd');
    evoCtx.restore();

    /* ── 링 하이라이트 (상단) ── */
    evoCtx.save();
    evoCtx.beginPath();
    evoCtx.arc(cx, cy, outerR, -Math.PI*0.85, -Math.PI*0.15, false);
    evoCtx.arc(cx, cy, outerR-8, -Math.PI*0.15, -Math.PI*0.85, true);
    evoCtx.closePath();
    evoCtx.fillStyle='rgba(255,255,255,0.28)';
    evoCtx.fill();
    evoCtx.restore();

    /* ── 링 테두리 ── */
    evoCtx.save();
    evoCtx.beginPath();
    evoCtx.arc(cx, cy, outerR, 0, Math.PI*2);
    evoCtx.strokeStyle='rgba(60,160,40,0.6)';
    evoCtx.lineWidth=2;
    evoCtx.stroke();
    evoCtx.beginPath();
    evoCtx.arc(cx, cy, innerR, 0, Math.PI*2);
    evoCtx.strokeStyle='rgba(80,180,50,0.4)';
    evoCtx.lineWidth=1.5;
    evoCtx.stroke();
    evoCtx.restore();

    /* ── 중앙 구멍 (크림색) ── */
    evoCtx.save();
    evoCtx.beginPath();
    evoCtx.arc(cx, cy, innerR-1, 0, Math.PI*2);
    const holeG=evoCtx.createRadialGradient(cx-5,cy-5,2,cx,cy,innerR);
    holeG.addColorStop(0,'rgba(255,245,210,0.85)');
    holeG.addColorStop(1,'rgba(240,210,140,0.6)');
    evoCtx.fillStyle=holeG;
    evoCtx.fill();
    evoCtx.restore();

    /* ── 과일 배치 (링 위에) ── */
    const n=FRUITS.length;
    const ringCenter=(outerR+innerR)/2;
    for(let i=0;i<n;i++){
        // 체리(0)를 왼쪽 상단~, 수박(10)을 상단에
        const angle=-Math.PI/2 - (Math.PI*2/n)*i;
        const fx=cx+ringCenter*Math.cos(angle);
        const fy=cy+ringCenter*Math.sin(angle);
        // 작은 크기로 그리기
        const drawR=Math.min(FRUITS[i].r*0.38, 11);
        drawFruitAt(evoCtx, fx, fy, i, 1, 0, drawR);
    }
}

/* ══════════════════════════════════════════════
   이벤트
══════════════════════════════════════════════ */
function getCX(e){ const r=canvas.getBoundingClientRect(); return (e.clientX-r.left)*(CW/r.width); }
canvas.addEventListener('mousemove', e=>{ if(!gameOver) cursorX=getCX(e); });
canvas.addEventListener('click',     e=>{ if(!gameOver){ cursorX=getCX(e); dropFruit(); } });
canvas.addEventListener('touchmove', e=>{ e.preventDefault(); if(!gameOver) cursorX=(e.touches[0].clientX-canvas.getBoundingClientRect().left)*(CW/canvas.getBoundingClientRect().width); },{passive:false});
canvas.addEventListener('touchend',  e=>{ e.preventDefault(); if(!gameOver) dropFruit(); },{passive:false});

/* ══════════════════════════════════════════════
   게임 루프
══════════════════════════════════════════════ */
let last=0;
function loop(ts){
    const dt=Math.min(ts-last,33); last=ts;
    Engine.update(engine,dt);
    processMerges();
    if(!gameOver) checkDanger();
    drawBG();
    drawAllFruits();
    drawDropPreview();
    drawBox();
    drawParticles();
    drawFloatTexts();
    drawNext();
    requestAnimationFrame(loop);
}

/* ══════════════════════════════════════════════
   시작 / 재시작
══════════════════════════════════════════════ */
function startGame(){
    score=0; gameOver=dropping=false;
    mergeQueue=[]; particles=[]; floatTexts=[];
    dangerTimer=0; goTimer=null;
    document.getElementById('score-val').textContent='0';
    document.getElementById('rank-now').textContent='0';
    document.getElementById('overlay').classList.add('hidden');
    if(engine){ Events.off(engine); World.clear(world); Engine.clear(engine); }
    initPhysics();
    currentIdx=randIdx(); nextIdx=randIdx(); cursorX=CW/2;
    todayScores=JSON.parse(localStorage.getItem('suika_today')||'[]');
    updateRankPanel();
    drawEvoRing();
}
function restartGame(){ startGame(); }

startGame();
requestAnimationFrame(loop);
</script>
