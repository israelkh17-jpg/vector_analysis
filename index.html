<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vector로 좌표평면 분석하기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f8fafc;
        }
        .canvas-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .data-row:nth-child(even) {
            background-color: #f1f5f9;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 3px;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="mb-8">
            <div class="flex items-center justify-center gap-4">
                <div class="text-center">
                    <h1 class="text-3xl font-extrabold text-slate-800 mb-2">Vector로 좌표평면 분석하기</h1>
                    <p class="text-slate-500 font-medium">데이터를 분석하고 저장하여 친구들과 공유해 보세요.</p>
                </div>
                <div id="qrcode" class="border-2 border-slate-200 shadow-sm rounded-xl overflow-hidden flex-shrink-0"></div>
            </div>
        </header>

        <!-- Main Layout Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
            
            <!-- Left Column: Input & Controls -->
            <div class="space-y-6">
                <!-- 1. 주제 및 성분 설정 -->
                <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-blue-700">
                        <span class="bg-blue-600 text-white w-5 h-5 rounded-full flex items-center justify-center text-xs font-mono">1</span>
                        분석 환경 설정
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">분석 주제</label>
                            <input type="text" id="topic" value="삼국지 인물 분석" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none transition-all" oninput="window.draw()">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">x성분 이름</label>
                                <input type="text" id="xName" value="전투력" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none" oninput="window.draw()">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">x 최대치</label>
                                <input type="number" id="xScale" value="100" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none" oninput="window.draw()">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">y성분 이름</label>
                                <input type="text" id="yName" value="지력" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none" oninput="window.draw()">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">y 최대치</label>
                                <input type="number" id="yScale" value="100" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none" oninput="window.draw()">
                            </div>
                        </div>
                    </div>
                </section>

                <!-- 2. 자료 입력하기 -->
                <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-blue-700">
                        <span class="bg-blue-600 text-white w-5 h-5 rounded-full flex items-center justify-center text-xs font-mono">2</span>
                        데이터 입력
                    </h2>
                    <div class="grid grid-cols-3 gap-2 mb-4">
                        <input type="text" id="inputLabel" placeholder="이름 (예: 관우)" class="col-span-3 px-3 py-2 border border-slate-300 rounded-md outline-none focus:ring-2 focus:ring-blue-500" onkeydown="if(event.key==='Enter') window.addData()">
                        <input type="number" id="inputX" placeholder="X값" class="px-3 py-2 border border-slate-300 rounded-md outline-none focus:ring-2 focus:ring-blue-500" onkeydown="if(event.key==='Enter') window.addData()">
                        <input type="number" id="inputY" placeholder="Y값" class="px-3 py-2 border border-slate-300 rounded-md outline-none focus:ring-2 focus:ring-blue-500" onkeydown="if(event.key==='Enter') window.addData()">
                        <button onclick="window.addData()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md font-bold transition-all shadow-sm">추가</button>
                    </div>

                    <div class="max-h-60 overflow-y-auto border border-slate-200 rounded-lg custom-scrollbar">
                        <table class="w-full text-xs text-left">
                            <thead class="bg-slate-50 text-slate-600 sticky top-0">
                                <tr>
                                    <th class="px-3 py-2">이름</th>
                                    <th class="px-3 py-2 text-center">X</th>
                                    <th class="px-3 py-2 text-center">Y</th>
                                    <th class="px-3 py-2 text-right">삭제</th>
                                </tr>
                            </thead>
                            <tbody id="dataTable"></tbody>
                        </table>
                    </div>
                    <div class="flex justify-between items-center mt-3">
                        <div class="flex gap-2">
                            <button onclick="window.loadSampleData()" class="text-[11px] bg-slate-100 hover:bg-blue-50 text-blue-600 px-2 py-1 rounded border border-blue-100 font-bold transition-all">
                                삼국지 예시 불러오기
                            </button>
                            <span id="counter" class="text-xs text-slate-400 font-medium flex items-center uppercase tracking-tighter">TOTAL: 0</span>
                        </div>
                        <button onclick="window.clearData()" class="text-xs text-red-400 hover:text-red-600 transition-colors font-semibold">전체 삭제</button>
                    </div>
                </section>

                <!-- 3. 저장 및 공유 -->
                <section class="bg-blue-50 p-6 rounded-xl shadow-sm border border-blue-100">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-blue-800">
                        <span class="bg-blue-800 text-white w-5 h-5 rounded-full flex items-center justify-center text-xs font-mono">3</span>
                        클라우드 저장하기
                    </h2>
                    <div class="flex gap-2">
                        <input type="text" id="saveTitle" placeholder="저장 이름 (예: 홍길동_분석)" class="flex-1 px-3 py-2 border border-blue-200 rounded-md outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                        <button id="saveBtn" onclick="window.saveToCloud()" class="bg-blue-800 text-white px-4 py-2 rounded-md font-bold text-sm hover:bg-blue-900 transition-all flex items-center gap-1 whitespace-nowrap">
                            저장
                        </button>
                    </div>
                </section>
            </div>

            <!-- Right Column: Visualization & Saved List -->
            <div class="space-y-6">
                <!-- Visualization Section -->
                <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-4 flex items-center justify-between text-slate-800">
                        <span>좌표평면 시각화</span>
                        <button onclick="window.downloadCanvas()" class="text-xs px-3 py-1 bg-slate-100 text-slate-600 rounded-full hover:bg-slate-200 transition-all font-semibold uppercase">
                            이미지로 저장
                        </button>
                    </h2>
                    <div id="canvasWrapper" class="canvas-container bg-slate-50 border border-slate-100">
                        <canvas id="plotCanvas"></canvas>
                    </div>
                    <p class="text-[10px] text-slate-400 text-center uppercase tracking-[0.2em] mt-4 font-bold">Analysis Preview</p>
                </section>

                <!-- Saved List Section -->
                <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col min-h-[400px]">
                    <h2 class="text-lg font-bold mb-4 flex items-center justify-between text-slate-800">
                        <span>저장된 목록</span>
                        <span id="listCounter" class="text-xs bg-slate-100 text-slate-500 px-2.5 py-1 rounded-full font-mono">...</span>
                    </h2>
                    <div id="savedList" class="flex-1 overflow-y-auto space-y-3 pr-2 custom-scrollbar max-h-[500px]">
                        <div class="text-center py-20 text-slate-300 text-sm">
                            목록을 불러오고 있습니다...
                        </div>
                    </div>
                </section>
            </div>

        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        // 'timestamp' 임포트 오류 해결: 'timestamp'는 공식 SDK에 존재하지 않음. serverTimestamp만 사용.
        import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase Configuration ---
        let app = null, auth = null, db = null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'vector-analysis-app';

        try {
            const firebaseConfig = (typeof __firebase_config !== 'undefined')
                ? JSON.parse(__firebase_config)
                : null;
            if (firebaseConfig && firebaseConfig.apiKey) {
                app  = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db   = getFirestore(app);
            }
        } catch (e) {
            console.warn("Firebase 초기화 실패 — 클라우드 기능을 사용할 수 없습니다.", e);
        }

        // --- Application State ---
        let dataPoints = [];
        let user = null;
        const canvas = document.getElementById('plotCanvas');
        const ctx = canvas.getContext('2d');

        // --- Initialization ---
        if (auth) {
            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (error) {
                    console.error("Auth Error:", error);
                }
            };
            initAuth();

            onAuthStateChanged(auth, (u) => {
                user = u;
                if (user) setupRealtimeListener();
            });
        } else {
            // Firebase 미설정 시 localStorage 목록 즉시 표시
            setupRealtimeListener();
        }

        // --- Functions ---

        function resizeCanvas() {
            const wrapper = document.getElementById('canvasWrapper');
            if (!wrapper) return;
            canvas.width = wrapper.clientWidth * window.devicePixelRatio;
            canvas.height = wrapper.clientHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            draw();
        }

        function addData() {
            const label = document.getElementById('inputLabel').value.trim();
            const x = parseFloat(document.getElementById('inputX').value);
            const y = parseFloat(document.getElementById('inputY').value);

            if (!label || isNaN(x) || isNaN(y)) return;

            dataPoints.push({ label, x, y, color: getRandomColor() });
            
            document.getElementById('inputLabel').value = '';
            document.getElementById('inputX').value = '';
            document.getElementById('inputY').value = '';
            document.getElementById('inputLabel').focus();

            renderTable();
            draw();
        }

        function deleteData(index) {
            dataPoints.splice(index, 1);
            renderTable();
            draw();
        }

        function clearData() {
            if(!confirm("모든 데이터를 삭제하시겠습니까?")) return;
            dataPoints = [];
            renderTable();
            draw();
        }

        function renderTable() {
            const tbody = document.getElementById('dataTable');
            const counter = document.getElementById('counter');
            if (!tbody) return;
            tbody.innerHTML = '';
            
            dataPoints.forEach((p, index) => {
                const tr = document.createElement('tr');
                tr.className = 'data-row border-b border-slate-100';
                tr.innerHTML = `
                    <td class="px-3 py-2 font-medium">${p.label}</td>
                    <td class="px-3 py-2 text-center text-slate-500">${p.x}</td>
                    <td class="px-3 py-2 text-center text-slate-500">${p.y}</td>
                    <td class="px-3 py-2 text-right">
                        <button onclick="window.deleteData(${index})" class="text-red-300 hover:text-red-500 transition-colors">✕</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            if (counter) counter.innerText = `TOTAL: ${dataPoints.length}`;
        }

        function draw() {
            if (!canvas) return;
            const width = canvas.width / window.devicePixelRatio;
            const height = canvas.height / window.devicePixelRatio;
            const padding = 50;
            const plotWidth = width - padding * 2;
            const plotHeight = height - padding * 2;

            const topic = document.getElementById('topic').value;
            const xName = document.getElementById('xName').value;
            const yName = document.getElementById('yName').value;
            const xScale = parseFloat(document.getElementById('xScale').value) || 100;
            const yScale = parseFloat(document.getElementById('yScale').value) || 100;

            ctx.clearRect(0, 0, width, height);

            // 가이드라인
            ctx.strokeStyle = '#f1f5f9';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for(let i=0; i<=10; i++) {
                let yPos = padding + (plotHeight * (1 - i/10));
                ctx.moveTo(padding, yPos);
                ctx.lineTo(padding + plotWidth, yPos);
                let xPos = padding + (plotWidth * (i/10));
                ctx.moveTo(xPos, padding);
                ctx.lineTo(xPos, padding + plotHeight);
            }
            ctx.stroke();

            // 축
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, padding + plotHeight);
            ctx.lineTo(padding + plotWidth, padding + plotHeight);
            ctx.stroke();

            // 텍스트 라벨
            ctx.fillStyle = '#1e293b';
            ctx.font = 'bold 16px Pretendard';
            ctx.textAlign = 'center';
            ctx.fillText(topic, width/2, padding - 20);
            
            ctx.font = 'bold 12px Pretendard';
            ctx.fillText(xName, padding + plotWidth/2, padding + plotHeight + 40);
            
            ctx.save();
            ctx.translate(padding - 35, padding + plotHeight/2);
            ctx.rotate(-Math.PI/2);
            ctx.fillText(yName, 0, 0);
            ctx.restore();

            // 스케일 수치
            ctx.font = '10px Pretendard';
            ctx.fillStyle = '#94a3b8';
            ctx.textAlign = 'right';
            ctx.fillText('0', padding - 8, padding + plotHeight + 5);
            ctx.fillText(yScale, padding - 8, padding + 5);
            ctx.textAlign = 'center';
            ctx.fillText(xScale, padding + plotWidth, padding + plotHeight + 15);

            // 데이터 포인트
            dataPoints.forEach(p => {
                const px = padding + (Math.min(p.x, xScale) / xScale) * plotWidth;
                const py = padding + (1 - Math.min(p.y, yScale) / yScale) * plotHeight;

                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(px, py, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = '#334155';
                ctx.font = 'bold 11px Pretendard';
                ctx.textAlign = 'left';
                ctx.fillText(` ${p.label}`, px + 8, py + 4);
            });
        }

        function getRandomColor() {
            const colors = ['#f43f5e', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function loadSampleData(isInitial = false) {
            if (!isInitial && dataPoints.length > 0 && !confirm("현재 입력된 데이터가 사라집니다. 예시 데이터를 불러올까요?")) return;
            
            document.getElementById('topic').value = "삼국지 인물 분석";
            document.getElementById('xName').value = "전투력";
            document.getElementById('xScale').value = 100;
            document.getElementById('yName').value = "지력";
            document.getElementById('yScale').value = 100;

            dataPoints = [
                { label: '관우', x: 98, y: 82, color: '#f43f5e' },
                { label: '장비', x: 99, y: 30, color: '#3b82f6' },
                { label: '유비', x: 75, y: 80, color: '#10b981' },
                { label: '조조', x: 82, y: 92, color: '#f59e0b' },
                { label: '제갈량', x: 38, y: 100, color: '#8b5cf6' },
                { label: '주유', x: 80, y: 95, color: '#ec4899' },
                { label: '조운', x: 96, y: 75, color: '#06b6d4' },
                { label: '허저', x: 94, y: 20, color: '#f43f5e' },
                { label: '방통', x: 30, y: 98, color: '#3b82f6' },
                { label: '손권', x: 70, y: 78, color: '#10b981' }
            ];
            renderTable();
            draw();
        }

        function downloadCanvas() {
            const link = document.createElement('a');
            link.download = `분석_${document.getElementById('topic').value}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // --- localStorage 기반 저장/불러오기 ---
        const LOCAL_STORAGE_KEY = 'vector_analysis_saved_plots';

        function getLocalPlots() {
            try { return JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY) || '[]'); } catch { return []; }
        }

        function setLocalPlots(plots) {
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(plots));
        }

        function renderSavedList(docs) {
            const listEl = document.getElementById('savedList');
            const counterEl = document.getElementById('listCounter');
            if (!listEl) return;
            listEl.innerHTML = '';
            if (docs.length === 0) {
                listEl.innerHTML = '<div class="text-center py-20 text-slate-300 text-sm font-medium italic">등록된 분석 자료가 없습니다.</div>';
                if (counterEl) counterEl.innerText = "0";
                return;
            }
            if (counterEl) counterEl.innerText = docs.length;
            docs.forEach(item => {
                const div = document.createElement('div');
                div.className = 'group p-4 bg-slate-50 border border-slate-200 rounded-xl hover:border-blue-500 hover:bg-white cursor-pointer transition-all shadow-sm flex justify-between items-center';

                const infoEl = document.createElement('div');
                const titleEl = document.createElement('h4');
                titleEl.className = 'font-bold text-slate-800 text-sm group-hover:text-blue-600 transition-colors';
                titleEl.textContent = item.title;
                const metaEl = document.createElement('div');
                metaEl.className = 'flex items-center gap-2 mt-1';
                const topicEl = document.createElement('span');
                topicEl.className = 'text-[10px] text-slate-400 font-medium';
                topicEl.textContent = item.topic;
                const ptsEl = document.createElement('span');
                ptsEl.className = 'text-[10px] bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded-full font-bold';
                ptsEl.textContent = `${item.data.length} pts`;
                metaEl.appendChild(topicEl);
                metaEl.appendChild(ptsEl);
                infoEl.appendChild(titleEl);
                infoEl.appendChild(metaEl);

                const loadEl = document.createElement('div');
                loadEl.className = 'opacity-0 group-hover:opacity-100 transition-opacity bg-blue-600 text-white text-[10px] font-bold px-3 py-1.5 rounded-lg shadow-md';
                loadEl.textContent = '불러오기';

                div.appendChild(infoEl);
                div.appendChild(loadEl);
                div.onclick = () => applyAnalysis(item);
                listEl.appendChild(div);
            });
        }

        async function saveToCloud() {
            const saveTitle = document.getElementById('saveTitle').value.trim();
            if (!saveTitle) { alert("저장할 분석 이름을 입력해 주세요."); return; }
            if (dataPoints.length === 0) { alert("데이터가 하나 이상 있어야 저장할 수 있습니다."); return; }

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerText = "저장 중...";

            const saveData = {
                id: Date.now().toString(),
                title: saveTitle,
                topic: document.getElementById('topic').value,
                xName: document.getElementById('xName').value,
                xScale: parseFloat(document.getElementById('xScale').value),
                yName: document.getElementById('yName').value,
                yScale: parseFloat(document.getElementById('yScale').value),
                data: dataPoints,
                timestamp: { seconds: Math.floor(Date.now() / 1000) }
            };

            // Firebase 우선, 실패 시 localStorage 폴백
            let saved = false;
            if (db && user) {
                try {
                    const collectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'saved_plots');
                    await addDoc(collectionRef, { ...saveData, timestamp: serverTimestamp(), createdBy: user.uid });
                    saved = true;
                } catch (error) {
                    console.warn("Firebase 저장 실패, localStorage로 저장합니다.", error);
                }
            }

            if (!saved) {
                const plots = getLocalPlots();
                plots.push(saveData);
                setLocalPlots(plots);
                const sorted = [...plots].sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                renderSavedList(sorted);
            }

            alert("성공적으로 저장되었습니다!");
            document.getElementById('saveTitle').value = "";
            btn.disabled = false;
            btn.innerText = "저장";
        }

        function setupRealtimeListener() {
            if (!user || !db) {
                // Firebase 없으면 localStorage에서 불러오기
                const plots = getLocalPlots().sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                renderSavedList(plots);
                return;
            }
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'saved_plots');
            onSnapshot(q, (snapshot) => {
                const docs = [];
                snapshot.forEach(docSnap => { docs.push({ id: docSnap.id, ...docSnap.data() }); });
                docs.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                renderSavedList(docs);
            }, (error) => { console.error("Firestore Error:", error); });
        }

        function applyAnalysis(item) {
            if(!confirm(`'${item.title}' 데이터를 불러오시겠습니까?\n현재 작성 중인 내용은 사라집니다.`)) return;
            document.getElementById('topic').value = item.topic || "";
            document.getElementById('xName').value = item.xName || "";
            document.getElementById('xScale').value = item.xScale || 100;
            document.getElementById('yName').value = item.yName || "";
            document.getElementById('yScale').value = item.yScale || 100;
            dataPoints = item.data || [];
            renderTable();
            draw();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- Functions Exposed to Window (중요: HTML 인라인 onclick에서 접근 가능하도록) ---
        window.addData = addData;
        window.deleteData = deleteData;
        window.clearData = clearData;
        window.draw = draw;
        window.downloadCanvas = downloadCanvas;
        window.saveToCloud = saveToCloud;
        window.applyAnalysis = applyAnalysis;
        window.loadSampleData = loadSampleData;

        // 초기 실행
        window.addEventListener('load', () => {
            resizeCanvas();
            loadSampleData(true);
            // QR코드 생성
            new QRCode(document.getElementById('qrcode'), {
                text: 'https://vectoranalysis.vercel.app',
                width: 128,
                height: 128,
                colorDark: '#1e293b',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.M
            });
        });
        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
