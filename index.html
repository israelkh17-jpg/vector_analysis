<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flying Physics - Interactive Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');

        body {
            background-color: #020617;
            font-family: 'Pretendard', sans-serif;
            color: #f8fafc;
        }

        .glass-morphism {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hero-gradient {
            background: radial-gradient(circle at top right, rgba(56, 189, 248, 0.15), transparent),
                        radial-gradient(circle at bottom left, rgba(244, 114, 182, 0.1), transparent);
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #38bdf8;
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Icons ---
        const IconAtom = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M12 21.5c4.7 0 8.5-3.8 8.5-8.5s-3.8-8.5-8.5-8.5S3.5 8.3 3.5 13s3.8 8.5 8.5 8.5z" opacity=".2"/>
                <path d="M12 2v2"/><path d="M12 20v2"/>
                <path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/>
                <path d="M2 12h2"/><path d="M20 12h2"/>
                <path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
            </svg>
        );

        const IconHome = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
        );

        // --- App ---
        const App = () => {
            const [currentView, setCurrentView] = useState('home');

            if (currentView === 'circle') return <CircleLabView onBack={() => setCurrentView('home')} />;
            return <HomeView onNavigate={setCurrentView} />;
        };

        // --- Home View ---
        const HomeView = ({ onNavigate }) => (
            <div className="min-h-screen hero-gradient flex flex-col items-center justify-center p-6 text-center">
                <div className="animate-float mb-8">
                    <IconAtom />
                </div>
                <h1 className="text-5xl md:text-7xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-sky-400 to-pink-500">
                    Flying Physics
                </h1>
                <p className="text-slate-300 text-lg md:text-xl max-w-2xl mb-12 leading-relaxed">
                    동북고등학교 물리학 학습사이트입니다.<br/>
                    상호작용하는 시뮬레이션을 통해 물리학을 체험해 보세요.
                </p>

                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl w-full">

                    {/* 카드 1: 원형·리사주 궤적 */}
                    <div
                        onClick={() => onNavigate('circle')}
                        className="glass-morphism p-8 rounded-3xl group cursor-pointer hover:border-sky-400/50 transition-all duration-300 hover:scale-105"
                    >
                        <div className="w-16 h-16 bg-sky-500/10 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-sky-500/20 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M12 2a10 10 0 0 1 10 10"/>
                            </svg>
                        </div>
                        <h3 className="text-2xl font-bold mb-3 group-hover:text-sky-400 transition-colors">원형 및 리사주 궤적</h3>
                        <p className="text-slate-400 text-sm leading-relaxed">
                            sin·cos 함수의 합성을 통해 원, 타원, 그리고 복잡한 리사주 도형을 실시간으로 시각화합니다.
                        </p>
                        <div className="mt-6 flex items-center text-sky-400 font-semibold text-sm">
                            실험 시작하기 <span className="ml-2 group-hover:translate-x-2 transition-transform inline-block">→</span>
                        </div>
                    </div>

                    {/* 카드 2: 벡터로 좌표평면 분석하기 */}
                    <a href="vector.html" className="no-underline">
                        <div className="glass-morphism p-8 rounded-3xl group cursor-pointer hover:border-pink-400/50 transition-all duration-300 hover:scale-105 h-full">
                            <div className="w-16 h-16 bg-pink-500/10 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-pink-500/20 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28" fill="none">
                                    <line x1="4" y1="14" x2="24" y2="14" stroke="#f472b6" strokeWidth="1.5" strokeLinecap="round"/>
                                    <line x1="14" y1="4" x2="14" y2="24" stroke="#f472b6" strokeWidth="1.5" strokeLinecap="round"/>
                                    <circle cx="8"  cy="20" r="2.2" fill="#f43f5e"/>
                                    <circle cx="13" cy="10" r="2.2" fill="#a78bfa"/>
                                    <circle cx="20" cy="8"  r="2.2" fill="#38bdf8"/>
                                    <circle cx="22" cy="18" r="2.2" fill="#34d399"/>
                                </svg>
                            </div>
                            <h3 className="text-2xl font-bold mb-3 group-hover:text-pink-400 transition-colors">Vector로 좌표평면 분석하기</h3>
                            <p className="text-slate-400 text-sm leading-relaxed">
                                데이터를 좌표평면에 직접 올리고 분석하세요. 결과는 클라우드에 저장하고 친구들과 공유할 수 있습니다.
                            </p>
                            <div className="mt-6 flex items-center text-pink-400 font-semibold text-sm">
                                실습 시작하기 <span className="ml-2 group-hover:translate-x-2 transition-transform inline-block">→</span>
                            </div>
                        </div>
                    </a>

                    {/* 카드 3: 테트리스 즐기기 */}
                    <a href="tetris.html" className="no-underline">
                        <div className="glass-morphism p-8 rounded-3xl group cursor-pointer hover:border-emerald-400/50 transition-all duration-300 hover:scale-105 h-full">
                            <div className="w-16 h-16 bg-emerald-500/10 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-emerald-500/20 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28" fill="none">
                                    <rect x="4"  y="4"  width="8" height="8" rx="2" fill="#10b981" opacity="0.9"/>
                                    <rect x="16" y="4"  width="8" height="8" rx="2" fill="#3b82f6" opacity="0.9"/>
                                    <rect x="4"  y="16" width="8" height="8" rx="2" fill="#f59e0b" opacity="0.9"/>
                                    <rect x="16" y="16" width="8" height="8" rx="2" fill="#f43f5e" opacity="0.9"/>
                                </svg>
                            </div>
                            <h3 className="text-2xl font-bold mb-3 group-hover:text-emerald-400 transition-colors">테트리스 즐기기</h3>
                            <p className="text-slate-400 text-sm leading-relaxed">
                                클래식 테트리스를 즐겨 보세요. 코로베이니키 배경음악과 함께하는 프리미엄 에디션입니다.
                            </p>
                            <div className="mt-6 flex items-center text-emerald-400 font-semibold text-sm">
                                게임 시작하기 <span className="ml-2 group-hover:translate-x-2 transition-transform inline-block">→</span>
                            </div>
                        </div>
                    </a>

                </div>

                <footer className="mt-20 text-slate-500 text-sm border-t border-slate-800 pt-8 w-full max-w-4xl">
                    &copy; 2024 Flying Physics @ Dongbuk High School. Designed for Learning.
                </footer>
            </div>
        );

        // --- Circle Lab View ---
        const CircleLabView = ({ onBack }) => {
            const [params, setParams] = useState({
                freqX: 1, freqY: 1,
                radiusX: 120, radiusY: 120,
                speed: 0.02, phase: 0,
                trailLength: 400, showComponents: true,
            });
            const [isPlaying, setIsPlaying] = useState(true);
            const [time, setTime] = useState(0);
            const [points, setPoints] = useState([]);
            const canvasRef = useRef(null);
            const requestRef = useRef();

            const animate = () => {
                if (isPlaying) setTime((prev) => prev + params.speed);
                requestRef.current = requestAnimationFrame(animate);
            };

            useEffect(() => {
                requestRef.current = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(requestRef.current);
            }, [isPlaying, params.speed]);

            useEffect(() => {
                const x = Math.cos(time * params.freqX + params.phase) * params.radiusX;
                const y = Math.sin(time * params.freqY) * params.radiusY;
                setPoints((prev) => {
                    const next = [...prev, { x, y }];
                    return next.length > params.trailLength ? next.slice(-params.trailLength) : next;
                });
            }, [time, params]);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const { width, height } = canvas;
                const cx = width / 2, cy = height / 2;

                ctx.clearRect(0, 0, width, height);
                ctx.strokeStyle = '#1e293b';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, cy); ctx.lineTo(width, cy);
                ctx.moveTo(cx, 0); ctx.lineTo(cx, height);
                ctx.stroke();

                if (points.length > 1) {
                    ctx.lineWidth = 2.5;
                    points.forEach((p, i) => {
                        if (i === 0) return;
                        ctx.strokeStyle = `rgba(56, 189, 248, ${i / points.length})`;
                        ctx.beginPath();
                        ctx.moveTo(cx + points[i-1].x, cy + points[i-1].y);
                        ctx.lineTo(cx + p.x, cy + p.y);
                        ctx.stroke();
                    });
                }

                if (points.length > 0) {
                    const current = points[points.length - 1];
                    if (params.showComponents) {
                        const xInd = { x: cx + current.x, y: 60 };
                        const yInd = { x: width - 60, y: cy + current.y };
                        ctx.setLineDash([5, 5]);
                        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(xInd.x, xInd.y); ctx.lineTo(cx + current.x, cy + current.y);
                        ctx.moveTo(yInd.x, yInd.y); ctx.lineTo(cx + current.x, cy + current.y);
                        ctx.stroke();
                        ctx.setLineDash([]);
                        ctx.fillStyle = '#38bdf8'; ctx.beginPath(); ctx.arc(xInd.x, xInd.y, 6, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = '#f472b6'; ctx.beginPath(); ctx.arc(yInd.x, yInd.y, 6, 0, Math.PI*2); ctx.fill();
                    }
                    ctx.fillStyle = '#fff'; ctx.shadowBlur = 15; ctx.shadowColor = '#38bdf8';
                    ctx.beginPath(); ctx.arc(cx + current.x, cy + current.y, 8, 0, Math.PI*2); ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }, [points, params]);

            const handleParam = (k, v) => {
                setParams(p => ({ ...p, [k]: parseFloat(v) }));
                if (['freqX', 'freqY', 'phase', 'radiusX', 'radiusY'].includes(k)) setPoints([]);
            };

            return (
                <div className="flex flex-col md:flex-row h-screen bg-slate-950 overflow-hidden">
                    <div className="w-full md:w-80 p-6 bg-slate-900 border-r border-slate-800 flex flex-col gap-6 overflow-y-auto">
                        <button onClick={onBack} className="flex items-center gap-2 text-slate-400 hover:text-white transition-colors mb-2 group">
                            <IconHome />
                            <span className="font-medium">홈으로 돌아가기</span>
                        </button>

                        <div className="space-y-5">
                            <h2 className="text-xl font-bold text-sky-400 border-b border-slate-800 pb-2">실험 설정</h2>
                            <Control label="X축 진폭 (Rx)" val={params.radiusX} min="0" max="250" color="sky" onChange={v => handleParam('radiusX', v)} />
                            <Control label="Y축 진폭 (Ry)" val={params.radiusY} min="0" max="250" color="pink" onChange={v => handleParam('radiusY', v)} />
                            <Control label="X축 진동수" val={params.freqX} min="0.1" max="10" step="0.1" color="sky" unit="Hz" onChange={v => handleParam('freqX', v)} />
                            <Control label="Y축 진동수" val={params.freqY} min="0.1" max="10" step="0.1" color="pink" unit="Hz" onChange={v => handleParam('freqY', v)} />
                            <Control label="위상차" val={(params.phase / Math.PI).toFixed(2)} min="0" max={Math.PI * 2} step="0.01" color="slate" unit="π" onChange={v => handleParam('phase', v)} />
                            <label className="flex items-center gap-3 cursor-pointer mt-2">
                                <input type="checkbox" checked={params.showComponents} onChange={(e) => handleParam('showComponents', e.target.checked)} className="w-4 h-4 rounded border-slate-700 text-sky-500 bg-slate-800"/>
                                <span className="text-sm text-slate-300">성분 분석 모드</span>
                            </label>
                        </div>

                        <div className="mt-auto flex gap-2 pt-4">
                            <button onClick={() => setIsPlaying(!isPlaying)} className={`flex-1 py-3 rounded-xl font-bold transition-all ${isPlaying ? 'bg-amber-600 hover:bg-amber-500' : 'bg-emerald-600 hover:bg-emerald-500'}`}>
                                {isPlaying ? '일시정지' : '재생'}
                            </button>
                            <button onClick={() => { setPoints([]); setTime(0); }} className="p-3 bg-slate-800 hover:bg-slate-700 rounded-xl border border-slate-700">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                    <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
                                    <path d="M21 3v5h-5"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 flex items-center justify-center p-8">
                        <div className="w-full h-full max-w-2xl max-h-2xl aspect-square glass-morphism rounded-3xl overflow-hidden relative shadow-2xl">
                            <canvas ref={canvasRef} width={700} height={700} className="w-full h-full" />
                            <div className="absolute top-4 left-4 bg-slate-900/50 backdrop-blur px-3 py-1 rounded-full text-[10px] text-slate-400 font-mono">
                                REALTIME TRAJECTORY SIMULATION
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Control = ({ label, val, min, max, step = "1", color, unit = "", onChange }) => (
            <section>
                <div className="flex justify-between mb-2 text-sm font-medium">
                    <label className="text-slate-400">{label}</label>
                    <span className={`text-${color}-400 font-mono`}>{val}{unit}</span>
                </div>
                <input type="range" min={min} max={max} step={step} value={val}
                    onChange={(e) => onChange(e.target.value)}
                    className="w-full h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer" />
            </section>
        );

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
