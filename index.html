                    <a href="sudoku.html" className="no-underline">
                        <div className="glass-morphism p-8 rounded-3xl group cursor-pointer hover:border-violet-400/50 transition-all duration-300 hover:scale-105 h-full">
                            <div className="w-16 h-16 bg-violet-500/10 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-violet-500/20 transition-colors">

                                    <rect x="11" y="11" width="7" height="7" rx="1.5" fill="#38bdf8" opacity="0.9"/>
                                    <rect x="19" y="11" width="7" height="7" rx="1.5" fill="#8b5cf6" opacity="0.45"/>
                                    <rect x="3" y="19" width="7" height="7" rx="1.5" fill="#8b5cf6" opacity="0.85"/>
                                    <rect x="11" y="19" width="7" height="7" rx="1.5" fill="#8b5cf6" opacity="0.45"/>
                                    <rect x="19" y="19" width="7" height="7" rx="1.5" fill="#8b5cf6" opacity="0.85"/>

                                <span className="text-slate-500">규칙: 각 가로줄·세로줄·3×3 박스 안에 1~9가 한 번씩만 들어가야 합니다.</span>

        );

        // --- Circle Lab View ---
        const BASE_R = 120;
        const BASE_F = 1;
        const RADIUS_OPTIONS = [
            { val: 0,            label: '0' },
            { val: BASE_R / 2,   label: '½R' },
            { val: BASE_R,       label: 'R' },
            { val: BASE_R * 1.5, label: '³⁄₂R' },
            { val: BASE_R * 2,   label: '2R' },
        ];
        const FREQ_OPTIONS = [
            { val: 0,            label: '0' },
            { val: BASE_F / 2,   label: '½f' },
            { val: BASE_F,       label: 'f' },
            { val: BASE_F * 1.5, label: '³⁄₂f' },
            { val: BASE_F * 2,   label: '2f' },
            { val: BASE_F * 2.5, label: '⁵⁄₂f' },
            { val: BASE_F * 3,   label: '3f' },
        ];
        const PHASE_OPTIONS = [
            { val: 0,                   label: '0' },
            { val: Math.PI / 4,         label: '¼π' },
            { val: Math.PI / 2,         label: '½π' },
            { val: Math.PI,             label: 'π' },
            { val: Math.PI * 3 / 2,     label: '³⁄₂π' },
            { val: Math.PI * 7 / 4,     label: '⁷⁄₄π' },
            { val: Math.PI * 2,         label: '2π' },
        ];

        const CircleLabView = ({ onBack }) => {
            const [params, setParams] = useState({
                freqX: BASE_F, freqY: BASE_F,
                radiusX: BASE_R, radiusY: BASE_R,
                speed: 0.02, phase: 0,
                trailLength: 400, showComponents: true,
            });
            const [isPlaying, setIsPlaying] = useState(true);
            const [time, setTime] = useState(0);
            const [points, setPoints] = useState([]);
            const canvasRef = useRef(null);
            const requestRef = useRef();

            const animate = () => {
                if (isPlaying) setTime((prev) => prev + params.speed);
                requestRef.current = requestAnimationFrame(animate);
            };

            useEffect(() => {
                requestRef.current = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(requestRef.current);
            }, [isPlaying, params.speed]);

            useEffect(() => {
                const x = Math.cos(time * params.freqX + params.phase) * params.radiusX;
                const y = Math.sin(time * params.freqY) * params.radiusY;
                setPoints((prev) => {
                    const next = [...prev, { x, y }];
                    return next.length > params.trailLength ? next.slice(-params.trailLength) : next;
                });
            }, [time, params]);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const { width, height } = canvas;
                const cx = width / 2, cy = height / 2;

                ctx.clearRect(0, 0, width, height);
                ctx.strokeStyle = '#1e293b';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, cy); ctx.lineTo(width, cy);
                ctx.moveTo(cx, 0); ctx.lineTo(cx, height);
                ctx.stroke();

                if (points.length > 1) {
                    ctx.lineWidth = 2.5;
                    points.forEach((p, i) => {
                        if (i === 0) return;
                        ctx.strokeStyle = `rgba(56, 189, 248, ${i / points.length})`;
                        ctx.beginPath();
                        ctx.moveTo(cx + points[i-1].x, cy + points[i-1].y);
                        ctx.lineTo(cx + p.x, cy + p.y);
                        ctx.stroke();
                    });
                }

                if (points.length > 0) {
                    const current = points[points.length - 1];
                    if (params.showComponents) {
                        const xInd = { x: cx + current.x, y: 60 };
                        const yInd = { x: width - 60, y: cy + current.y };
                        ctx.setLineDash([5, 5]);
                        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(xInd.x, xInd.y); ctx.lineTo(cx + current.x, cy + current.y);
                        ctx.moveTo(yInd.x, yInd.y); ctx.lineTo(cx + current.x, cy + current.y);
                        ctx.stroke();
                        ctx.setLineDash([]);
                        ctx.fillStyle = '#38bdf8'; ctx.beginPath(); ctx.arc(xInd.x, xInd.y, 6, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = '#f472b6'; ctx.beginPath(); ctx.arc(yInd.x, yInd.y, 6, 0, Math.PI*2); ctx.fill();
                    }
                    ctx.fillStyle = '#fff'; ctx.shadowBlur = 15; ctx.shadowColor = '#38bdf8';
                    ctx.beginPath(); ctx.arc(cx + current.x, cy + current.y, 8, 0, Math.PI*2); ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }, [points, params]);

            const setDiscreteParam = (k, v) => {
                setParams(p => ({ ...p, [k]: v }));
                setPoints([]);
                setTime(0);
            };

            return (
                <div className="flex flex-col md:flex-row min-h-screen md:h-screen bg-slate-950 overflow-y-auto md:overflow-hidden">
                    {/* Sidebar */}
                    <div className="w-full md:w-80 p-4 md:p-6 bg-slate-900 border-b md:border-b-0 md:border-r border-slate-800 flex flex-col gap-4 md:gap-5 overflow-y-auto flex-shrink-0 order-2 md:order-none">
                        <button onClick={onBack} className="flex items-center gap-2 text-slate-400 hover:text-white transition-colors mb-2 group">
                            <IconHome />
                            <span className="font-medium">홈으로 돌아가기</span>
                        </button>

                        <div className="space-y-6">
                            <h2 className="text-xl font-bold text-sky-400 border-b border-slate-800 pb-2">실험 설정</h2>

                            <DiscreteControl
                                label="X축 진폭 (Rx)"
                                options={RADIUS_OPTIONS}
                                value={params.radiusX}
                                activeColor="#38bdf8"
                                onChange={v => setDiscreteParam('radiusX', v)}
                            />
                            <DiscreteControl
                                label="Y축 진폭 (Ry)"
                                options={RADIUS_OPTIONS}
                                value={params.radiusY}
                                activeColor="#f472b6"
                                onChange={v => setDiscreteParam('radiusY', v)}
                            />
                            <DiscreteControl
                                label="X축 진동수 (fx)"
                                options={FREQ_OPTIONS}
                                value={params.freqX}
                                activeColor="#38bdf8"
                                onChange={v => setDiscreteParam('freqX', v)}
                            />
                            <DiscreteControl
                                label="Y축 진동수 (fy)"
                                options={FREQ_OPTIONS}
                                value={params.freqY}
                                activeColor="#f472b6"
                                onChange={v => setDiscreteParam('freqY', v)}
                            />
                            <DiscreteControl
                                label="위상차 (φ)"
                                options={PHASE_OPTIONS}
                                value={params.phase}
                                activeColor="#a78bfa"
                                onChange={v => setDiscreteParam('phase', v)}
                            />

                            {/* 속력 연속 슬라이더 */}
                            <section>
                                <div className="flex justify-between mb-2 text-sm font-medium">
                                    <label className="text-slate-400">점의 속력</label>
                                    <span className="text-emerald-400 font-mono">{params.speed.toFixed(3)}</span>
                                </div>
                                <input type="range" min="0.002" max="0.08" step="0.002"
                                    value={params.speed}
                                    onChange={(e) => setParams(p => ({ ...p, speed: parseFloat(e.target.value) }))}
                                    className="w-full h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer" />
                            </section>

                            <label className="flex items-center gap-3 cursor-pointer">
                                <input type="checkbox" checked={params.showComponents}
                                    onChange={(e) => setParams(p => ({ ...p, showComponents: e.target.checked }))}
                                    className="w-4 h-4 rounded border-slate-700 bg-slate-800"/>
                                <span className="text-sm text-slate-300">성분 분석 모드</span>
                            </label>
                        </div>

                        <div className="mt-auto flex gap-2 pt-4">
                            <button onClick={() => setIsPlaying(!isPlaying)}
                                className={`flex-1 py-3 rounded-xl font-bold transition-all ${isPlaying ? 'bg-amber-600 hover:bg-amber-500' : 'bg-emerald-600 hover:bg-emerald-500'}`}>
                                {isPlaying ? '일시정지' : '재생'}
                            </button>
                            <button onClick={() => { setPoints([]); setTime(0); }}
                                className="p-3 bg-slate-800 hover:bg-slate-700 rounded-xl border border-slate-700">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                    <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
                                    <path d="M21 3v5h-5"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    {/* Canvas */}
                    <div className="flex-1 flex items-center justify-center p-3 md:p-4 overflow-hidden order-1 md:order-none">
                        <div
                            className="glass-morphism rounded-3xl overflow-hidden relative shadow-2xl"
                            style={{ width: '100%', maxWidth: '600px', aspectRatio: '1 / 1', maxHeight: 'min(92vw, calc(100vh - 2rem))' }}
                        >
                            <canvas ref={canvasRef} width={700} height={700}
                                style={{ display: 'block', width: '100%', height: '100%' }} />
                            <div className="absolute top-4 left-4 bg-slate-900/50 backdrop-blur px-3 py-1 rounded-full text-[10px] text-slate-400 font-mono">
                                REALTIME TRAJECTORY SIMULATION
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const DiscreteControl = ({ label, options, value, activeColor, onChange }) => (
            <section>
                <div className="text-sm font-medium text-slate-400 mb-2">{label}</div>
                <div className="flex flex-wrap gap-1.5">
                    {options.map(opt => {
                        const isActive = Math.abs(value - opt.val) < 0.0001;
                        return (
                            <button
                                key={opt.val}
                                onClick={() => onChange(opt.val)}
                                style={isActive ? { borderColor: activeColor, color: activeColor, background: activeColor + '22' } : {}}
                                className={`flex-1 min-w-[2.6rem] py-1.5 rounded-lg text-xs font-bold transition-all border ${
                                    isActive ? '' : 'bg-slate-800 border-slate-700 text-slate-400 hover:border-slate-500 hover:text-slate-300'
                                }`}
                            >
                                {opt.label}
                            </button>
                        );
                    })}
                </div>
            </section>
        );

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
